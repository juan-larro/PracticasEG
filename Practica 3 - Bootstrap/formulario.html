<!--5) En un nuevo documento, crear un formulario de contacto. El mismo debe contener los
siguientes campos: nombre, email, teléfono, asunto y cuerpo del mensaje. Todos los
campos menos el cuerpo del mensaje (que será un textarea) deberán ser inputs de texto.
Añadir un botón para enviar dicho formulario-->
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Formulario Bootstrap</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="container">
        <form>
            <div class="form-group">
                <label for="nombre">Ingrese su nombre</label>
                <input type="text" class="form-control" id="inputNombre">
                <label for="exampleInputEmail1">Email</label>
                <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                <small id="emailHelp" class="form-text text-muted">We'll never share your email with anyone else.</small>
                <br>
                <label for="telefono">Ingrese su telefono</label>
                <input type="number" class="form-control" id="inputTelefono">
                <label for="asunto">Asunto</label>
                <br>
                <textarea id="feedback" name="feedback" rows="4" cols="50" placeholder="Type your message here..."></textarea>

            </div>
            <button type="submit" class="btn btn-primary">Enviar</button>
</form>
    </div>
</body>
